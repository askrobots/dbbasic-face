<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300">
  <g id="puppet" style="transform-box:fill-box;transform-origin:50% 100%">

    <g id="legs">
      <rect id="leg-left" x="84" y="222" width="16" height="38" rx="8" fill="#2e3a59"/>
      <rect id="leg-right" x="104" y="222" width="16" height="38" rx="8" fill="#2e3a59"/>
      <ellipse cx="91" cy="264" rx="18" ry="8" fill="#1a1a1a"/>
      <ellipse cx="113" cy="264" rx="18" ry="8" fill="#1a1a1a"/>
    </g>

    <g id="arm-left" style="transform-box:fill-box;transform-origin:75% 8%">
      <path d="M64,150 Q42,174 48,200" stroke="#1a1a1a" stroke-width="14" fill="none" stroke-linecap="round"/>
      <circle cx="48" cy="202" r="11" fill="#ffffff" stroke="#1a1a1a" stroke-width="3"/>
    </g>
    <g id="arm-right" style="transform-box:fill-box;transform-origin:25% 8%">
      <path d="M136,150 Q158,174 152,200" stroke="#1a1a1a" stroke-width="14" fill="none" stroke-linecap="round"/>
      <circle cx="152" cy="202" r="11" fill="#ffffff" stroke="#1a1a1a" stroke-width="3"/>
    </g>

    <g id="body">
      <path d="M70,150 Q100,136 130,150 L136,224 Q100,241 64,224 Z" fill="#a8362f" stroke="#1a1a1a" stroke-width="3"/>
      <circle cx="100" cy="175" r="4" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
      <circle cx="100" cy="195" r="4" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
      <path d="M92,150 L100,158 L108,150 L104,146 Q100,150 96,146 Z" fill="#1a1a1a"/>
    </g>

    <g id="head" style="transform-box:fill-box;transform-origin:50% 88%">
      <circle cx="100" cy="95" r="58" fill="#f6dfae" stroke="#1a1a1a" stroke-width="4"/>

      <ellipse id="cheek-left" cx="66" cy="112" rx="8" ry="5" fill="#e0777a" opacity="0.35"/>
      <ellipse id="cheek-right" cx="134" cy="112" rx="8" ry="5" fill="#e0777a" opacity="0.35"/>

      <g id="brows">
        <path id="brow-left" style="transform-box:fill-box;transform-origin:50% 50%"
              d="M66,66 Q78,58 90,65" stroke="#1a1a1a" stroke-width="5" fill="none" stroke-linecap="round"/>
        <path id="brow-right" style="transform-box:fill-box;transform-origin:50% 50%"
              d="M110,65 Q122,58 134,66" stroke="#1a1a1a" stroke-width="5" fill="none" stroke-linecap="round"/>
      </g>

      <!-- Pie-cut eyes: white sclera behind a black wedge-cut pupil, classic rubber-hose look -->
      <g id="eyes" style="transform-box:fill-box;transform-origin:50% 50%">
        <g id="eye-left">
          <ellipse cx="80" cy="92" rx="14" ry="16" fill="#ffffff" stroke="#1a1a1a" stroke-width="3"/>
        </g>
        <g id="eye-right">
          <ellipse cx="120" cy="92" rx="14" ry="16" fill="#ffffff" stroke="#1a1a1a" stroke-width="3"/>
        </g>
        <g id="pupils">
          <circle cx="80" cy="93" r="8" fill="#1a1a1a"/>
          <circle cx="120" cy="93" r="8" fill="#1a1a1a"/>
          <circle cx="82.6" cy="90.4" r="2.4" fill="#ffffff"/>
          <circle cx="122.6" cy="90.4" r="2.4" fill="#ffffff"/>
        </g>
      </g>

      <g id="nose">
        <path d="M96,106 Q100,112 104,106 Q100,110 96,106 Z" fill="#1a1a1a"/>
      </g>

      <!-- Nine viseme mouth shapes, flat cartoon style: exactly one visible at a time -->
      <g id="mouths">
        <g id="mouth-X">
          <path d="M85,127 Q100,133 115,127" stroke="#1a1a1a" stroke-width="4" fill="none" stroke-linecap="round"/>
        </g>
        <g id="mouth-A">
          <path d="M85,129 L115,129" stroke="#1a1a1a" stroke-width="5" fill="none" stroke-linecap="round"/>
        </g>
        <g id="mouth-B">
          <path d="M86,124 Q100,120 114,124 Q114,135 100,136 Q86,135 86,124 Z" fill="#1a1a1a"/>
          <rect x="90" y="124" width="20" height="5" rx="2" fill="#ffffff"/>
        </g>
        <g id="mouth-C">
          <ellipse cx="100" cy="129" rx="13" ry="8.5" fill="#1a1a1a"/>
        </g>
        <g id="mouth-D">
          <ellipse cx="100" cy="130" rx="17" ry="13" fill="#1a1a1a"/>
          <ellipse cx="100" cy="138" rx="9" ry="5" fill="#e0777a"/>
        </g>
        <g id="mouth-E">
          <circle cx="100" cy="129" r="8" fill="#1a1a1a"/>
        </g>
        <g id="mouth-F">
          <ellipse cx="100" cy="129" rx="5.5" ry="7.5" fill="#1a1a1a" stroke="#a8362f" stroke-width="3"/>
        </g>
        <g id="mouth-G">
          <rect x="89" y="124" width="22" height="6.5" rx="2.5" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
          <path d="M86,134 Q100,138 114,134" stroke="#1a1a1a" stroke-width="4" fill="none" stroke-linecap="round"/>
        </g>
        <g id="mouth-H">
          <ellipse cx="100" cy="129" rx="12" ry="9.5" fill="#1a1a1a"/>
          <ellipse cx="100" cy="123.5" rx="6.5" ry="3.5" fill="#e0777a"/>
        </g>
      </g>
    </g>
  </g>
</svg>
