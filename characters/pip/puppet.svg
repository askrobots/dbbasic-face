<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 280">
  <g id="puppet" style="transform-box:fill-box;transform-origin:50% 100%">

    <g id="legs">
      <rect id="leg-left" x="84" y="228" width="15" height="36" rx="7" fill="#4a5568"/>
      <rect id="leg-right" x="122" y="228" width="15" height="36" rx="7" fill="#4a5568"/>
      <ellipse cx="90" cy="266" rx="15" ry="7" fill="#2d3748"/>
      <ellipse cx="130" cy="266" rx="15" ry="7" fill="#2d3748"/>
    </g>

    <g id="arm-left" style="transform-box:fill-box;transform-origin:70% 10%">
      <path d="M68,168 Q48,190 52,212" stroke="#ed8936" stroke-width="14" fill="none" stroke-linecap="round"/>
      <circle cx="52" cy="214" r="9" fill="#f6ad55"/>
    </g>
    <g id="arm-right" style="transform-box:fill-box;transform-origin:30% 10%">
      <path d="M152,168 Q172,190 168,212" stroke="#ed8936" stroke-width="14" fill="none" stroke-linecap="round"/>
      <circle cx="168" cy="214" r="9" fill="#f6ad55"/>
    </g>

    <g id="body">
      <path d="M70,150 Q110,134 150,150 L157,226 Q110,246 63,226 Z" fill="#ed8936"/>
      <ellipse cx="110" cy="204" rx="27" ry="21" fill="#fbd38d"/>
    </g>

    <g id="head" style="transform-box:fill-box;transform-origin:50% 90%">
      <circle cx="110" cy="88" r="64" fill="#f6ad55" stroke="#dd6b20" stroke-width="3"/>
      <path d="M96,26 Q104,10 118,18 Q110,22 112,30" fill="#dd6b20"/>

      <circle id="cheek-left" cx="70" cy="102" r="9" fill="#fc8181" opacity="0.45"/>
      <circle id="cheek-right" cx="150" cy="102" r="9" fill="#fc8181" opacity="0.45"/>

      <g id="brows">
        <path id="brow-left" style="transform-box:fill-box;transform-origin:50% 50%"
              d="M74,58 Q86,50 98,57" stroke="#7b341e" stroke-width="5" fill="none" stroke-linecap="round"/>
        <path id="brow-right" style="transform-box:fill-box;transform-origin:50% 50%"
              d="M122,57 Q134,50 146,58" stroke="#7b341e" stroke-width="5" fill="none" stroke-linecap="round"/>
      </g>

      <g id="eyes" style="transform-box:fill-box;transform-origin:50% 50%">
        <g id="eye-left">
          <circle cx="86" cy="80" r="12" fill="#fff" stroke="#7b341e" stroke-width="2"/>
        </g>
        <g id="eye-right">
          <circle cx="134" cy="80" r="12" fill="#fff" stroke="#7b341e" stroke-width="2"/>
        </g>
        <g id="pupils">
          <circle cx="88" cy="81" r="5.5" fill="#2d3748"/>
          <circle cx="136" cy="81" r="5.5" fill="#2d3748"/>
        </g>
      </g>

      <!-- Rhubarb mouth shapes: exactly one visible at a time -->
      <g id="mouths">
        <g id="mouth-X">
          <path d="M96,122 Q110,129 124,122" stroke="#7b341e" stroke-width="4.5" fill="none" stroke-linecap="round"/>
        </g>
        <g id="mouth-A">
          <path d="M95,124 L125,124" stroke="#7b341e" stroke-width="5" fill="none" stroke-linecap="round"/>
        </g>
        <g id="mouth-B">
          <path d="M95,119 Q110,115 125,119 Q125,131 110,132 Q95,131 95,119 Z" fill="#5f2412"/>
          <rect x="99" y="119" width="22" height="5" rx="2" fill="#fff"/>
        </g>
        <g id="mouth-C">
          <ellipse cx="110" cy="124" rx="13" ry="8.5" fill="#5f2412"/>
        </g>
        <g id="mouth-D">
          <ellipse cx="110" cy="125" rx="17" ry="13" fill="#5f2412"/>
          <ellipse cx="110" cy="133" rx="9" ry="5" fill="#fc8181"/>
        </g>
        <g id="mouth-E">
          <circle cx="110" cy="124" r="8" fill="#5f2412"/>
        </g>
        <g id="mouth-F">
          <ellipse cx="110" cy="124" rx="5.5" ry="7.5" fill="#5f2412" stroke="#c05621" stroke-width="3"/>
        </g>
        <g id="mouth-G">
          <rect x="99" y="119" width="22" height="6.5" rx="2.5" fill="#fff" stroke="#7b341e" stroke-width="1.5"/>
          <path d="M96,129 Q110,133 124,129" stroke="#7b341e" stroke-width="4" fill="none" stroke-linecap="round"/>
        </g>
        <g id="mouth-H">
          <ellipse cx="110" cy="124" rx="12" ry="9.5" fill="#5f2412"/>
          <ellipse cx="110" cy="118.5" rx="6.5" ry="3.5" fill="#fc8181"/>
        </g>
      </g>
    </g>
  </g>
</svg>
