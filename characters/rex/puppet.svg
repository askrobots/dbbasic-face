<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200">
  <g id="puppet" style="transform-box:fill-box;transform-origin:50% 100%">

    <g id="tail" style="transform-box:fill-box;transform-origin:95% 90%">
      <path d="M92,112 Q60,95 50,65 Q46,58 55,60 Q70,80 88,105 Q95,110 92,112 Z" fill="#d98e4f" stroke="#1a1a1a" stroke-width="3"/>
      <ellipse cx="51" cy="64" rx="8" ry="6" fill="#b06a35"/>
    </g>

    <g id="legs">
      <g id="leg-back-left" style="transform-box:fill-box;transform-origin:50% 4%">
        <rect x="95" y="135" width="16" height="38" rx="8" fill="#d98e4f" stroke="#1a1a1a" stroke-width="3"/>
        <ellipse cx="103" cy="177" rx="15" ry="7" fill="#1a1a1a"/>
      </g>
      <g id="leg-back-right" style="transform-box:fill-box;transform-origin:50% 4%">
        <rect x="119" y="139" width="16" height="40" rx="8" fill="#d98e4f" stroke="#1a1a1a" stroke-width="3"/>
        <ellipse cx="127" cy="183" rx="15" ry="7" fill="#1a1a1a"/>
      </g>
      <g id="leg-front-left" style="transform-box:fill-box;transform-origin:50% 4%">
        <rect x="175" y="138" width="16" height="40" rx="8" fill="#d98e4f" stroke="#1a1a1a" stroke-width="3"/>
        <ellipse cx="183" cy="181" rx="15" ry="7" fill="#1a1a1a"/>
      </g>
      <g id="leg-front-right" style="transform-box:fill-box;transform-origin:50% 4%">
        <rect x="198" y="141" width="16" height="42" rx="8" fill="#d98e4f" stroke="#1a1a1a" stroke-width="3"/>
        <ellipse cx="206" cy="185" rx="15" ry="7" fill="#1a1a1a"/>
      </g>
    </g>

    <g id="body">
      <path d="M85,120 Q90,90 140,88 Q190,86 213,105 Q222,120 213,138 Q190,152 140,150 Q90,148 85,120 Z"
            fill="#d98e4f" stroke="#1a1a1a" stroke-width="4"/>
      <ellipse cx="150" cy="133" rx="52" ry="14" fill="#f6dfae" opacity="0.9"/>
      <ellipse cx="172" cy="96" rx="18" ry="10" fill="#b06a35"/>
    </g>

    <g id="head" style="transform-box:fill-box;transform-origin:30% 80%">
      <g id="ear-far" style="transform-box:fill-box;transform-origin:50% 0%">
        <path d="M180,50 Q155,55 150,90 Q148,108 165,112 Q178,100 182,70 Z" fill="#b06a35" stroke="#1a1a1a" stroke-width="3"/>
      </g>

      <circle cx="210" cy="78" r="38" fill="#d98e4f" stroke="#1a1a1a" stroke-width="4"/>

      <g id="ear-near" style="transform-box:fill-box;transform-origin:50% 0%">
        <path d="M232,46 Q252,55 248,92 Q246,110 228,110 Q222,95 226,68 Z" fill="#b06a35" stroke="#1a1a1a" stroke-width="3"/>
      </g>

      <ellipse cx="257" cy="100" rx="30" ry="22" fill="#f6dfae" stroke="#1a1a1a" stroke-width="3"/>
      <ellipse cx="283" cy="94" rx="9" ry="7" fill="#1a1a1a"/>

      <!-- Pie-cut eyes: white sclera behind a black wedge-cut pupil, classic rubber-hose look -->
      <g id="eyes" style="transform-box:fill-box;transform-origin:50% 50%">
        <g id="eye-left">
          <ellipse cx="193" cy="66" rx="11" ry="13" fill="#ffffff" stroke="#1a1a1a" stroke-width="3"/>
        </g>
        <g id="eye-right">
          <ellipse cx="219" cy="66" rx="11" ry="13" fill="#ffffff" stroke="#1a1a1a" stroke-width="3"/>
        </g>
        <g id="pupils">
          <circle cx="193" cy="67" r="6" fill="#1a1a1a"/>
          <circle cx="219" cy="67" r="6" fill="#1a1a1a"/>
          <circle cx="195.2" cy="64.4" r="1.8" fill="#ffffff"/>
          <circle cx="221.2" cy="64.4" r="1.8" fill="#ffffff"/>
        </g>
      </g>

      <!-- Nine mouth shapes drawn as muzzle/jaw poses: exactly one visible at a time -->
      <g id="mouths">
        <g id="mouth-X" style="transform-box:fill-box;transform-origin:50% 50%">
          <path d="M251,112 Q263,116 275,112" stroke="#1a1a1a" stroke-width="3" fill="none" stroke-linecap="round"/>
        </g>
        <g id="mouth-A">
          <path d="M251,113 L275,113" stroke="#1a1a1a" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        </g>
        <g id="mouth-B">
          <path d="M252,109 Q263,106 274,109 Q274,116 263,117 Q252,116 252,109 Z" fill="#1a1a1a"/>
          <rect x="255" y="109" width="16" height="4" rx="2" fill="#ffffff"/>
        </g>
        <g id="mouth-C">
          <ellipse cx="263" cy="112" rx="10" ry="6.5" fill="#1a1a1a"/>
        </g>
        <g id="mouth-D">
          <ellipse cx="263" cy="113" rx="13" ry="10" fill="#1a1a1a"/>
          <ellipse cx="263" cy="118" rx="7" ry="4" fill="#e0777a"/>
        </g>
        <g id="mouth-E">
          <circle cx="263" cy="112" r="6" fill="#1a1a1a"/>
        </g>
        <g id="mouth-F">
          <ellipse cx="263" cy="112" rx="4" ry="6" fill="#1a1a1a" stroke="#d98e4f" stroke-width="2.5"/>
        </g>
        <g id="mouth-G">
          <rect x="254" y="109" width="18" height="5" rx="2" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
          <path d="M252,116 Q263,119 274,116" stroke="#1a1a1a" stroke-width="3" fill="none" stroke-linecap="round"/>
        </g>
        <g id="mouth-H">
          <ellipse cx="263" cy="112" rx="9" ry="7.5" fill="#1a1a1a"/>
          <ellipse cx="263" cy="107.5" rx="5" ry="3" fill="#e0777a"/>
        </g>
      </g>
    </g>
  </g>
</svg>
