<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180">
  <!-- bottom-edge ticker band, hugging the frame's lower edge -->
  <rect x="0" y="163" width="320" height="17" fill="#111111" opacity="0.93"/>

  <!-- accent tag block on the left -->
  <rect x="0" y="163" width="42" height="17" fill="#c8102e"/>
  <text data-slot="tag" x="21" y="175" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif" font-size="9" font-weight="900"
        fill="#ffffff" letter-spacing="0.5">NEWS</text>

  <text data-slot="title" x="50" y="175" font-family="Arial, Helvetica, sans-serif"
        font-size="10" font-weight="600" fill="#ffffff">Scrolling headline text here</text>
</svg>
